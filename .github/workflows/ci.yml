name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Generate Tuist Project
        run: mise exec -- tuist generate

      - name: Run Tests
        run: mise exec -- tuist test
