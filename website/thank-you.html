<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Support!</title>
    
    <!-- Premium Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --primary-glow: rgba(255, 45, 85, 0.4);
            --bg-dark: #0A0A0C;
            --card-bg: rgba(20, 20, 25, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-pink: #FF375F;
            --accent-purple: #BF5AF2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Ambient Background Glows */
        .ambient-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            filter: blur(80px);
            opacity: 0.5;
            animation: pulse-glow 8s infinite alternate;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(191, 90, 242, 0.3) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -150px;
            filter: blur(100px);
            opacity: 0.4;
            animation: pulse-glow 10s infinite alternate-reverse;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(20px, 30px); }
        }

        /* Glassmorphism Card Container */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 48px 40px;
            width: 90%;
            max-width: 460px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 10;
            transform: translateY(30px);
            opacity: 0;
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slide-up {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Gradient Glowing Success Icon */
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border-radius: 24px;
            opacity: 0.2;
            transform: rotate(45deg);
            animation: spin-slow 20s linear infinite;
        }

        .icon-inner {
            position: relative;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .icon-inner svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
            animation: heart-pulse 2s infinite ease-in-out;
        }

        @keyframes heart-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes spin-slow {
            100% { transform: rotate(405deg); }
        }

        /* Typography */
        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #FFFFFF, #E2E2E2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .app-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 45, 85, 0.12);
            border: 1px solid rgba(255, 45, 85, 0.2);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-pink);
            margin-bottom: 24px;
            transform: scale(0.9);
            opacity: 0;
            animation: fade-in-scale 0.5s 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fade-in-scale {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #A1A1AA;
            margin-bottom: 36px;
        }

        /* Animated Progress Status */
        .status-container {
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 14px;
            color: #71717A;
            font-weight: 500;
        }

        /* Premium Interactive Button */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 45, 85, 0.35);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 45, 85, 0.45);
        }

        .button:hover::before {
            transform: translateX(100%);
        }

        .button:active {
            transform: translateY(1px);
        }

        /* Footer Lock Secure Note */
        .footer-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 36px;
            font-size: 12px;
            color: #52525B;
        }

        .footer-note svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="card">
        <div class="icon-container">
            <div class="icon-bg"></div>
            <div class="icon-inner">
                <!-- Heart SVG -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
        </div>

        <h1 id="headline">Thank You!</h1>
        
        <div id="app-pill" class="app-pill" style="display: none;">
            <span id="app-name">Pruneapple</span> Support
        </div>

        <p id="description-text">We are processing your contribution. Your support is greatly appreciated!</p>

        <div class="status-container" id="status-box">
            <div class="spinner"></div>
            <div class="status-text" id="status-text">Redirecting you back to the app...</div>
        </div>

        <a href="#" id="action-btn" class="button" style="display: none;">
            <span>Open Application</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>

        <div class="footer-note">
            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <span>Secure connection established</span>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Read parameters from URL (originally passed to Stripe, then forwarded)
            const utmSource = urlParams.get('utm_source');
            const utmContent = urlParams.get('utm_content') || 'donation';
            const sessionId = urlParams.get('session_id');

            const headlineEl = document.getElementById("headline");
            const appPillEl = document.getElementById("app-pill");
            const appNameEl = document.getElementById("app-name");
            const descEl = document.getElementById("description-text");
            const statusBoxEl = document.getElementById("status-box");
            const actionBtnEl = document.getElementById("action-btn");
            const statusTextEl = document.getElementById("status-text");

            // Mapping of supported application schemes
            const appSchemes = {
                'pruneapple': 'pruneapple://donate-success',
                // You can add other apps here when reusing this page
                // 'otherapp': 'otherapp://success'
            };

            if (utmSource) {
                const normalizedSource = utmSource.toLowerCase();
                const targetScheme = appSchemes[normalizedSource];

                if (targetScheme) {
                    // Display details
                    appNameEl.textContent = capitalize(utmSource);
                    appPillEl.style.display = "inline-flex";
                    descEl.innerHTML = `Your donation was successful. Thank you for supporting the development of <strong>${capitalize(utmSource)}</strong>!`;

                    // Construct target deep-link
                    const deepLinkUrl = `${targetScheme}?tier=${encodeURIComponent(utmContent)}&session_id=${encodeURIComponent(sessionId || '')}`;

                    // Set action button link as manual fallback
                    actionBtnEl.href = deepLinkUrl;
                    actionBtnEl.style.display = "inline-flex";

                    // Start automatic redirection countdown
                    let secondsLeft = 1;
                    const interval = setInterval(() => {
                        secondsLeft--;
                        if (secondsLeft <= 0) {
                            clearInterval(interval);
                            window.location.href = deepLinkUrl;
                            statusTextEl.textContent = "Opening the app... If it didn't open, click the button above.";
                        } else {
                            statusTextEl.textContent = `Redirecting you back to the app in ${secondsLeft}s...`;
                        }
                    }, 1000);
                    
                    return;
                }
            }

            // Fallback for direct page visits (no tracking tags found)
            headlineEl.textContent = "Thank You!";
            descEl.textContent = "Your contribution was received successfully. We appreciate your support!";
            statusBoxEl.style.display = "none";
        });

        function capitalize(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
    </script>
</body>
</html>
